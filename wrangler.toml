name = "coregit-api"
main = "src/index.ts"
compatibility_date = "2025-10-13"
compatibility_flags = ["nodejs_compat"]

# Per-version preview URLs (workers.dev). Required so `wrangler versions
# upload --preview-alias <slug>` actually publishes a reachable
# {slug}-coregit-api.<account>.workers.dev URL for the openhive preview
# pipeline. Prod traffic still goes through the api.coregit.dev route below;
# this flag only enables version-scoped URLs, not workers.dev for the
# active production version.
preview_urls = true

[[routes]]
pattern = "api.coregit.dev/*"
zone_name = "coregit.dev"

[[r2_buckets]]
binding = "REPOS_BUCKET"
bucket_name = "coregit-repos"

[[r2_buckets]]
binding = "LFS_BUCKET"
bucket_name = "coregit-lfs"

[vars]
CORS_ORIGIN = "https://coregit.dev"

[placement]
mode = "smart"

# ── Hyperdrive (Neon PostgreSQL connection pooling + query cache) ──

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "96f53f0e51e34fa1affe045c62e2f907"

# ── Version metadata ──
# Lets src/db/index.ts distinguish prod active version (untagged) from
# openhive preview alias versions (tagged via `versions upload --tag <sha>`).
# Prevents a leaked PREVIEW_DATABASE_URL secret from ever masking Hyperdrive
# in production.

[version_metadata]
binding = "CF_VERSION_METADATA"

[limits]
cpu_ms = 30_000

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Background maintenance — loose-object repack sweeper.
# Every 6h: find repos touched in the last ~6h and, if their loose-object count
# exceeds PACK_THRESHOLD, run packLooseObjects(). See src/index.ts#scheduled.
[triggers]
crons = ["0 */6 * * *"]

# Semantic search tree cache (commit SHA → blob SHAs)
[[kv_namespaces]]
binding = "TREE_CACHE"
id = "05b0261ea3c94239b1c51ea45dffed3c"

# Semantic search result cache (query + commitSha → results)
[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "9c1e4b496923414ba6cf6d988e6a8bc7"

# Embedding cache (content hash → embedding vector)
[[kv_namespaces]]
binding = "EMBEDDING_CACHE"
id = "f81718abb3c34b7799582ae964de32e5"

# Code graph query result cache
[[kv_namespaces]]
binding = "GRAPH_CACHE"
id = "728b507d5aac4961b6324622c7ae34d8"

# Hybrid search result cache
[[kv_namespaces]]
binding = "HYBRID_CACHE"
id = "b1ab293bd0934871bf9369b024ed9b74"

# Auth + repo resolution cache (short TTL)
[[kv_namespaces]]
binding = "AUTH_CACHE"
id = "2e8b19027dac46aea1920850f594188c"

# Git object cache (immutable SHA-addressed, no TTL)
[[kv_namespaces]]
binding = "GIT_OBJ_CACHE"
id = "0d6c6341b99e415e9c89a2cac2a65bcc"

# Semantic search indexing queue
[[queues.producers]]
queue = "coregit-indexing"
binding = "INDEXING_QUEUE"

[[queues.consumers]]
queue = "coregit-indexing"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "coregit-indexing-dlq"
max_concurrency = 20

# ── Durable Objects ──

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiterDO" },
  { name = "SESSION_DO", class_name = "SessionDO" },
  { name = "REPO_HOT_DO", class_name = "RepoHotDO" }
]

# Service binding to the private coregit-api-wiki Worker. AGPL core
# forwards /v1/repos/:slug/wiki/* requests to the add-on via this binding.
[[services]]
binding = "WIKI"
service = "coregit-api-wiki"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]

[[migrations]]
tag = "v2"
new_classes = ["SessionDO"]

[[migrations]]
tag = "v3"
new_classes = ["RepoHotDO"]

# Secrets (set via wrangler secret put):
# DATABASE_URL           — Neon PostgreSQL (separate project from Strayl)
# BETTER_AUTH_SECRET     — Better Auth signing secret (min 32 chars)
# GOOGLE_CLIENT_ID       — Google OAuth (for dashboard login)
# GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID       — GitHub OAuth (for dashboard login)
# GITHUB_CLIENT_SECRET
# DODO_PAYMENTS_API_KEY  — Dodo Payments API key for usage event ingestion
# SYNC_ENCRYPTION_KEY    — 32-byte hex key for encrypting external connection tokens & webhook secrets
# R2_ACCESS_KEY_ID       — R2 S3-compatible API token ID (for LFS presigned URLs)
# R2_SECRET_ACCESS_KEY   — R2 S3-compatible API secret (for LFS presigned URLs)
# R2_ACCOUNT_ID          — Cloudflare Account ID (for LFS presigned URLs)
# PINECONE_API_KEY       — Pinecone API key for vector search
# VOYAGE_API_KEY         — Voyage AI API key for code embeddings & reranking
# PINECONE_INDEX_HOST    — Pinecone serverless index host URL

# ──────────────────────────────────────────────────────────────────────
#  PREVIEW DEPLOYMENTS (per-branch via versions upload)
# ──────────────────────────────────────────────────────────────────────
# Openhive's GHA workflow runs `wrangler versions upload --preview-alias <slug>`
# on every push to a non-main branch. The new version inherits ALL prod
# bindings (KV, queues, DOs, Hyperdrive, services) automatically — only
# DATABASE_URL is overridden per-deploy via --secrets-file so each task's
# Neon branch is exposed to the preview without rewriting Hyperdrive's
# config. The deploy lands at <slug>-coregit-api.<account>.workers.dev.
#
# Caveats:
#   - Preview shares prod KV / queues / RateLimiter DO. For Openhive's
#     personal-scale tasks this is acceptable; revisit if multiple
#     concurrent agent tasks ever land.
#   - DO migrations require `wrangler deploy` (not `versions upload`).
#     If a task adds a DO class, fall back to a one-off deploy.
