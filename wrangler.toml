name = "coregit-api"
main = "src/index.ts"
compatibility_date = "2025-10-13"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.coregit.dev/*"
zone_name = "coregit.dev"

[[r2_buckets]]
binding = "REPOS_BUCKET"
bucket_name = "coregit-repos"

[[r2_buckets]]
binding = "LFS_BUCKET"
bucket_name = "coregit-lfs"

[vars]
CORS_ORIGIN = "https://coregit.dev"

[placement]
mode = "smart"

[limits]
cpu_ms = 30_000

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Secrets (set via wrangler secret put):
# DATABASE_URL           — Neon PostgreSQL (separate project from Strayl)
# BETTER_AUTH_SECRET     — Better Auth signing secret (min 32 chars)
# GOOGLE_CLIENT_ID       — Google OAuth (for dashboard login)
# GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID       — GitHub OAuth (for dashboard login)
# GITHUB_CLIENT_SECRET
# DODO_PAYMENTS_API_KEY  — Dodo Payments API key for usage event ingestion
# SYNC_ENCRYPTION_KEY    — 32-byte hex key for encrypting external connection tokens & webhook secrets
# R2_ACCESS_KEY_ID       — R2 S3-compatible API token ID (for LFS presigned URLs)
# R2_SECRET_ACCESS_KEY   — R2 S3-compatible API secret (for LFS presigned URLs)
# R2_ACCOUNT_ID          — Cloudflare Account ID (for LFS presigned URLs)
