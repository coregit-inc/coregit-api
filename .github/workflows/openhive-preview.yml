name: Openhive preview

# Triggered by every push to a non-main branch (Openhive pushes branches
# named `openhive-task-N`). Each push uploads a new VERSION of the Worker
# (not promoted to prod) aliased at <slug>-coregit-api.<account>.workers.dev.
# All bindings inherit from prod; only DATABASE_URL is overridden per-deploy
# so the version talks to its own Neon branch.
#
# On `delete` (branch removed): the matching Neon branch is torn down. The
# Worker version itself ages out as new versions are uploaded — no manual
# Worker cleanup needed.

on:
  push:
    branches-ignore: [main]
  delete:

permissions:
  contents: read

concurrency:
  group: openhive-preview-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_PROD_BRANCH: ${{ vars.NEON_PROD_BRANCH }}

jobs:
  teardown:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Slugify branch
        id: slug
        run: |
          slug=$(echo "${{ github.event.ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-50)
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview-${{ steps.slug.outputs.slug }}
          api_key: ${{ secrets.NEON_API_KEY }}

  preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Slugify branch
        id: slug
        run: |
          slug=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-50)
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Create or reuse Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent_branch: ${{ env.NEON_PROD_BRANCH }}
          branch_name: preview-${{ steps.slug.outputs.slug }}
          api_key: ${{ secrets.NEON_API_KEY }}

      # No automatic migrations: schema changes live in prod Neon
      # (applied via Neon MCP `run_sql`). Each preview branch is a
      # copy-on-write clone of prod, so it inherits the latest schema
      # automatically. For preview-only schema experiments, use Neon
      # MCP against db_url_pooled from the step above.
      #
      # Write the per-version PREVIEW_DATABASE_URL secret. The Worker's
      # src/db/index.ts gates this behind CF_VERSION_METADATA.tag so a
      # secret-scope leak can never reach the prod active version (which
      # has no tag — Workers Builds runs `wrangler deploy` without one).
      # Other secrets (BETTER_AUTH_SECRET, OAuth keys, etc.) inherit from
      # prod via the standard binding inheritance.
      - name: Build secrets file
        run: |
          umask 077
          jq -n --arg url "${{ steps.neon.outputs.db_url_pooled }}" \
            '{PREVIEW_DATABASE_URL: $url}' > /tmp/preview-secrets.json

      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ steps.slug.outputs.slug }} --tag ${{ github.sha }} --message "openhive ${{ github.ref_name }}@${{ github.sha }}" --secrets-file /tmp/preview-secrets.json

      - name: Cleanup secrets file
        if: always()
        run: rm -f /tmp/preview-secrets.json

      # Smoke test the preview against the per-branch Neon clone via
      # `wrangler dev --remote`. This is the workaround for Cloudflare's
      # restriction that preview URLs are not generated for Workers
      # that bind a Durable Object. We get the same effect: a
      # short-lived live worker on Cloudflare's network, talking to its
      # own preview Neon DB, exposed at localhost:8787 to the runner.
      #
      # Skipped automatically when COREGIT_API_KEY_DEV is not set (the
      # smoke step needs an authed key to hit /v1/* — health alone is
      # not enough to validate the new mount endpoints).
      - name: Smoke test mount endpoints
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          COREGIT_API_KEY: ${{ secrets.COREGIT_API_KEY_DEV }}
          COREGIT_TEST_REPO_SLUG: ${{ vars.COREGIT_TEST_REPO_SLUG }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${COREGIT_API_KEY:-}" ]; then
            echo "::warning::COREGIT_API_KEY_DEV secret not set; skipping smoke test"
            exit 0
          fi
          if [ -z "${COREGIT_TEST_REPO_SLUG:-}" ]; then
            echo "::warning::COREGIT_TEST_REPO_SLUG repo var not set; skipping smoke test"
            exit 0
          fi

          # Start wrangler dev --remote in background. --remote uses the
          # real CF account bindings (R2, KV, DO, Hyperdrive) and
          # listens on a local port, so the dev runner can hit it as if
          # it were the prod URL. Override DATABASE_URL via --var so the
          # version-metadata gate in src/db/index.ts picks the preview
          # Neon branch instead of prod Hyperdrive.
          npx wrangler dev --remote --port 8787 \
              --var "PREVIEW_DATABASE_URL:$DATABASE_URL" \
              > /tmp/wrangler-dev.log 2>&1 &
          DEV_PID=$!
          trap 'kill $DEV_PID 2>/dev/null || true' EXIT

          # Wait up to 90 s for /health to come up.
          for i in $(seq 1 90); do
            if curl -fsS "http://localhost:8787/health" > /dev/null 2>&1; then
              echo "wrangler dev ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" = "90" ]; then
              echo "::error::wrangler dev did not respond on /health within 90s"
              tail -50 /tmp/wrangler-dev.log
              exit 1
            fi
          done

          BASE="http://localhost:8787"

          echo "── /health ──"
          curl -fsS "$BASE/health"
          echo

          echo "── M3: POST /v1/session with custom ttl_seconds ──"
          SESSION_RES=$(curl -fsS -X POST "$BASE/v1/session" \
            -H "x-api-key: $COREGIT_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"ttl_seconds":3600,"idle_extend":true}')
          echo "$SESSION_RES" | jq .
          SESSION_ID=$(echo "$SESSION_RES" | jq -r '.session_id // empty')
          [ -n "$SESSION_ID" ] || { echo "::error::session_id missing"; exit 1; }
          [ "$(echo "$SESSION_RES" | jq -r '.ttl_seconds')" = "3600" ] || \
            { echo "::error::ttl_seconds did not honor request"; exit 1; }

          echo "── M1: POST /v1/repos/$COREGIT_TEST_REPO_SLUG/blobs/batch (empty paths) ──"
          curl -fsS -X POST "$BASE/v1/repos/$COREGIT_TEST_REPO_SLUG/blobs/batch" \
            -H "x-api-key: $COREGIT_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"paths":[]}' | jq .

          echo "── M1: POST /v1/repos/$COREGIT_TEST_REPO_SLUG/blobs/batch (rejects oversize batch) ──"
          BIG=$(python3 -c "import json; print(json.dumps({'paths':['x']*101}))")
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            "$BASE/v1/repos/$COREGIT_TEST_REPO_SLUG/blobs/batch" \
            -H "x-api-key: $COREGIT_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BIG")
          [ "$STATUS" = "400" ] || { echo "::error::expected 400 on >100 paths, got $STATUS"; exit 1; }
          echo "ok: oversize batch rejected with 400"

          echo "── S4: POST /v1/repos/$COREGIT_TEST_REPO_SLUG/prefetch (rejects empty globs) ──"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            "$BASE/v1/repos/$COREGIT_TEST_REPO_SLUG/prefetch" \
            -H "x-api-key: $COREGIT_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"globs":[]}')
          [ "$STATUS" = "400" ] || { echo "::error::expected 400 on empty globs, got $STATUS"; exit 1; }
          echo "ok: empty globs rejected with 400"

          echo "── S3: GET /v1/repos/$COREGIT_TEST_REPO_SLUG/watch (Content-Type) ──"
          # Just check the SSE handshake — read 1 byte then drop the conn.
          CT=$(curl -sS -m 3 -D - "$BASE/v1/repos/$COREGIT_TEST_REPO_SLUG/watch" \
            -H "x-api-key: $COREGIT_API_KEY" -o /dev/null \
            | grep -i '^content-type:' | tr -d '\r')
          echo "$CT"
          echo "$CT" | grep -qi 'text/event-stream' || \
            { echo "::error::watch did not return SSE Content-Type"; exit 1; }
          echo "ok: watch returned SSE"

          echo "── DELETE /v1/session/$SESSION_ID ──"
          curl -fsS -X DELETE "$BASE/v1/session/$SESSION_ID" \
            -H "x-api-key: $COREGIT_API_KEY" | jq .

          echo "All smoke checks passed."

      - name: Dump wrangler dev log on failure
        if: failure()
        run: tail -200 /tmp/wrangler-dev.log 2>/dev/null || true

      # Soft-fail webhook: if OPENHIVE_WEBHOOK_URL isn't set or the
      # endpoint is unreachable, the preview deploy still counts as a
      # success — the live URL is reachable and a manually-opened PR
      # works without Openhive being online.
      - name: Notify Openhive (best-effort)
        if: ${{ steps.deploy.outputs.deployment-url != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.OPENHIVE_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.OPENHIVE_PREVIEW_WEBHOOK_SECRET }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          NEON_BRANCH_URL: ${{ steps.neon.outputs.db_url_pooled }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPO_REMOTE: ${{ github.repository }}
          DELIVERY_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
        run: |
          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_SECRET" ]; then
            echo "::notice::OPENHIVE_WEBHOOK_URL or _SECRET not configured; skipping notification (preview is live at $PREVIEW_URL)"
            exit 0
          fi
          BODY=$(jq -nc \
            --arg event 'preview.ready' \
            --arg preview_url "$PREVIEW_URL" \
            --arg neon_branch_url "$NEON_BRANCH_URL" \
            --arg branch "$BRANCH" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg repo_remote "$REPO_REMOTE" \
            '{event:$event, preview_url:$preview_url, neon_branch_url:$neon_branch_url, branch:$branch, commit_sha:$commit_sha, repo_remote:$repo_remote}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | awk '{print $2}')"
          if curl --max-time 10 -fsS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "X-Openhive-Delivery: $DELIVERY_ID" \
              -H "X-Openhive-Signature-256: $SIG" \
              -H "X-Openhive-Event: preview.ready" \
              --data "$BODY"; then
            echo "::notice::Notified Openhive at $WEBHOOK_URL"
          else
            echo "::warning::Openhive webhook failed (offline?). Preview is still live at $PREVIEW_URL"
          fi
