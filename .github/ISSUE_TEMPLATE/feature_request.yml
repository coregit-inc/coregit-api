name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve, not just the solution you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
      placeholder: "When I try to ... I can't ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives have you tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API (REST endpoints)
        - Git protocol
        - SDK (@coregit/sdk)
        - CLI (@coregit/cli)
        - Semantic search
        - Code graph
        - LLM Wiki
        - Sync
        - Self-hosting
        - New feature area
    validations:
      required: true
